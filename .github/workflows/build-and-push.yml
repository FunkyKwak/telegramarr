name: Build and Push Docker Image

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Lowercase repository name
              id: lowercase
              run: echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
              shell: bash

            - name: Determine tag
              id: tag
              shell: bash
              run: |
                TAG=""
                if [ -f "$GITHUB_EVENT_PATH" ]; then
                    TAG=$(grep -oP '"tag_name":\s*"\K([^"]+)' "$GITHUB_EVENT_PATH" || true)
                fi
                if [ -z "$TAG" ]; then
                    if [[ "$GITHUB_REF" == refs/tags/* ]]; then
                    TAG=${GITHUB_REF#refs/tags/}
                    elif [[ "$GITHUB_REF" == refs/heads/main ]]; then
                    TAG=latest
                    else
                    TAG=${GITHUB_SHA::8}
                    fi
                fi
                echo "TAG=$TAG" >> $GITHUB_OUTPUT

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                registry: ghcr.io
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v5
              with:
                context: .
                file: ./Dockerfile
                push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
                platforms: linux/amd64,linux/arm64
                tags: |
                    ghcr.io/${{ steps.lowercase.outputs.IMAGE_NAME }}:${{ steps.tag.outputs.TAG }}
                    ghcr.io/${{ steps.lowercase.outputs.IMAGE_NAME }}:latest
